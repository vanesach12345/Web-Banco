<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta Bancaria</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f6f6f7 0%, #fbfbfc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .form-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .form-header p {
            color: #666;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e5e5e5;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            background: #fafafa;
        }

        .form-input:focus {
            outline: none;
            border-color: #7c3aed;
            background: white;
        }

        .form-input::placeholder {
            color: #999;
        }

        .password-input {
            font-family: monospace;
            letter-spacing: 2px;
        }

        .divider {
            height: 1px;
            background: #e5e5e5;
            margin: 30px 0;
        }

        .documents-section {
            margin-top: 30px;
        }

        .documents-title {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 25px;
        }

        .document-upload {
            margin-bottom: 25px;
        }

        .document-upload label {
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: block;
        }

        .upload-area {
            border: 2px dashed #d1d5db;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            background: #f9fafb;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: #7c3aed;
            background: #f3f4f6;
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 12px;
            background: #e5e7eb;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .upload-icon::before {
            content: "📄";
            font-size: 24px;
        }

        .create-button {
            width: 100%;
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 30px;
        }

        .create-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
        }

        .create-button:active {
            transform: translateY(0);
        }

        @media (max-width: 480px) {
            .form-container {
                padding: 30px 20px;
                margin: 10px;
            }
            
            .form-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h1>Crear Cuenta</h1>
            <p>Completa tus datos para abrir tu cuenta bancaria</p>
        </div>

        <form>
            <div class="form-group">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" class="form-input" placeholder="Juan Pérez García">
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" class="form-input" placeholder="55 1234 5678">
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" class="form-input" placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label for="fecha">Fecha de Nacimiento</label>
                <input type="text" id="fecha" class="form-input" placeholder="dd/mm/aaaa">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="form-input password-input" placeholder="••••••••">
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirmar Contraseña</label>
                <input type="password" id="confirm-password" class="form-input password-input" placeholder="••••••••">
            </div>

            <div class="divider"></div>

            <div class="documents-section">
                <h2 class="documents-title">Documentos Requeridos</h2>
                
                <div class="document-upload">
                    <label>INE (Frente y Reverso)</label>
                    <div class="upload-area">
                        <div class="upload-icon"></div>
                        <p style="color: #666; font-size: 14px;">Haz clic para subir archivo</p>
                    </div>
                </div>

                <div class="document-upload">
                    <label>Comprobante de Domicilio</label>
                    <div class="upload-area">
                        <div class="upload-icon"></div>
                        <p style="color: #666; font-size: 14px;">Haz clic para subir archivo</p>
                    </div>
                </div>
            </div>

            <button type="submit" class="create-button">
                Crear Cuenta
            </button>
        </form>
    </div>
</body>
</html>
