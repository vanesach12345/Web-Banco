<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login Banco Seguro</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f6fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Fondo con rectángulos */
    .background {
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* para que no interfiera con clicks */
      overflow: hidden;
      z-index: 0;
    }

  .background img {
    position: absolute; /* todas las imágenes de fondo se posicionan */
  }
    .rect1 {
      top: -9px;          /* pegado arriba */
      left: -2%;           /* un poco a la izquierda */
      width: 350px;
      opacity: 0.9;
      transform: rotate(-6deg);
    }

    .rect2 {
      position: absolute;   /* aseguramos que quede flotando */
      top: 10px;            /* pegado arriba */
      left: -1%;             /* ahora a la izquierda */
      width: 300px;
      opacity: 0.85;
      transform: rotate(-3deg);
    }

    .tarjeta2 {
      bottom: 100px; 
      left: 15%;
      transform: translateX(-50%) rotate(2deg);
      width: 280px;
    }

    /* Contenedor general */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 80px;
      z-index: 1;
    }

    /* Caja de login */
    .login-box {
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0px 4px 20px rgba(0,0,0,0.1);
      width: 400px;
      text-align: center;
    }

    .login-box h2 {
      margin-bottom: 8px;
      font-size: 24px;
      font-weight: bold;
      color: #000;
    }

    .login-box p {
      margin-bottom: 24px;
      color: #666;
    }

    /* Logo */
    .logo img {
      width: 80px;
      margin-bottom: 16px;
    }

    /* Inputs */
    label {
      display: block;
      text-align: left;
      font-size: 14px;
      font-weight: bold;
      margin: 10px 0 4px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      font-size: 14px;
    }

    /* Botón principal */
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #6a1b9a;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    .btn-primary:hover {
      background: #4a148c;
    }

    /* Botón secundario */
    .btn-secondary {
      width: 100%;
      padding: 12px;
      background: white;
      border: 2px solid #6a1b9a;
      color: #6a1b9a;
      border-radius: 8px;
      margin-top: 12px;
      cursor: pointer;
      font-size: 16px;
    }

    .btn-secondary:hover {
      background: #f3e5f5;
    }

    /* Links */
    .link-forgot {
      display: block;
      margin: 12px 0;
      color: #f57c00;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
    }

    .link-forgot:hover {
      text-decoration: underline;
    }

    /* Tarjeta lateral */
    .card-image img {
      width: 600px;
      transform: rotate(-5deg);
    }
    /* Tablets (pantallas medianas) */
@media (max-width: 992px) {
  .rect1 {
    width: 280px;
    transform: translateX(-120px) rotate(-6deg);
  }

  .rect2 {
    width: 240px;
    transform: translateX(-40px) rotate(-3deg);
  }

  .tarjeta2 {
   
    width: 220px;
  }

  .login-container {
    flex-direction: column; /* apilar login y tarjeta */
    gap: 40px;
  }

  .card-image  {
    width: 450px;
    transform: rotate(-2deg);
  }
}

/* Móviles (pantallas pequeñas) */
@media (max-width: 600px) {
  .rect1 {
    width: 200px;
    transform: translateX(-50%) rotate(-6deg);
    left: 50%;
  }

  .rect2 {
    width: 180px;
    transform: translateX(-50%) rotate(-3deg);
    left: 50%;
    top: -20px;
  }

  .tarjeta2 {
    width: 180px;
    bottom: -20px;
  }

  .login-box {
    width: 90%; /* que ocupe casi todo el ancho */
    padding: 20px;
  }

  .card-image {
    width: 380px;
    transform: rotate(-1deg);
    margin-top: 40px; 
  }

  .login-container {
    gap: 30px;
  }
}
  </style>
</head>
<body>
  <!-- Fondo con imágenes -->
  <div class="background">
    <img src="../../../../public/rectangulo1.png" alt="Rectángulo morado 1" class="rect2">
    <img src="../../../../public/rectangulo2.png" alt="Rectángulo morado 2" class="rect1">
    <img src="../../../../public/tarjeta2.png" alt="Tarjeta Nova Capital" class="tarjeta2">

  </div>


  <div class="login-container"> 
    <!-- Caja de login -->
    <div class="login-box">
      <div class="logo">
        <img src="../../../../public/logo.png" alt="Nova Capital">
      </div>
      <h2>Banco Seguro</h2>
      <p>Ingresa a tu banco</p>

      <form>
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" placeholder="tu@email.com">

        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="******">

        <button class="btn-primary" type="submit">Iniciar Sesión</button>
      </form>

      <a class="link-forgot" href="#">¿Olvidaste tu contraseña?</a>
      <p>¿No tienes cuenta?</p>
      <button class="btn-secondary">Crear Cuenta Nueva</button>
    </div>

    <!-- Tarjeta lateral -->
    <div class="card-image">
      <img src="../../../../public/tarjeta.png" alt="Tarjeta Nova Capital">
    </div>
  </div>
</body>
</html>
