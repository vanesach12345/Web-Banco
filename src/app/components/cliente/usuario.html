  </div>

  <!-- Carrusel -->
  <!-- Carrusel automático (pegar en tu HTML) -->
<div style="margin:30px auto; width:100%; overflow:hidden;">
  <!-- viewport: ocultamos el scroll para que no se vea la barra -->
  <div id="viewport" style="width:100%; overflow:hidden;">
    <!-- track: contenido en fila -->
    <div id="track" style="display:flex; gap:20px; padding:10px; align-items:center; width:max-content;">
      <img src="../../../../public/img1.png" alt="Imagen 1" style="height:350px; border-radius:12px; flex-shrink:0;">
      <img src="../../../../public/img2.png" alt="Imagen 2" style="height:350px; border-radius:12px; flex-shrink:0;">
      <img src="../../../../public/img3.png" alt="Imagen 3" style="height:350px; border-radius:12px; flex-shrink:0;">
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const viewport = document.getElementById('viewport');
    const track = document.getElementById('track');

    // duplicamos el contenido para efecto infinito
    track.innerHTML = track.innerHTML + track.innerHTML;

    const speed = 0.6; // px por frame (ajusta: más grande = más rápido)
    let running = true;

    function step() {
      if (running) {
        viewport.scrollLeft += speed;
        // cuando llegamos a la mitad (primera copia), retrocedemos sin que se note
        if (viewport.scrollLeft >= track.scrollWidth / 2) {
          viewport.scrollLeft -= track.scrollWidth / 2;
        }
      }
      requestAnimationFrame(step);
    }

    requestAnimationFrame(step);

    // --- opcional: pausar al pasar el mouse (quita si no quieres esta funcionalidad) ---
    viewport.addEventListener('mouseenter', () => { running = false; });
    viewport.addEventListener('mouseleave', () => { running = true; });
  });
</script>
